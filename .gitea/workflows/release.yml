name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  sync-to-github:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.email "18666119673@163.com"
          git config --global user.name "Handy_Wote"

      - name: Add GitHub remote
        run: |
          echo "Adding GitHub remote for repo: $GH_REPO"
          git remote add github "https://${GH_TOKEN}@github.com/${GH_REPO}.git"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}

      - name: Push current branch to GitHub
        run: |
          # 使用 GITHUB_HEAD_REF 或 GITHUB_REF 获取分支名
          BRANCH=${{ github.ref_name }}
          echo "Branch: $BRANCH"
          git push github $BRANCH
          echo "已同步分支: $BRANCH"

      - name: Push tag to GitHub
        run: |
          TAG_NAME=${{ github.ref_name }}
          echo "Pushing tag: $TAG_NAME"
          git push github tag $TAG_NAME
          echo "已同步 tag: $TAG_NAME"

  deploy:
    runs-on: ubuntu-latest
    needs: sync-to-github
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull
            docker compose up -d --build
